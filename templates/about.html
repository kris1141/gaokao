<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>About</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="app-body">
  <main class="container py-4 app-shell">
    <header class="glass-nav p-3 mb-3">
      <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-center">
        <div>
          <p class="brand-en">CHONGQING GAOKAO</p>
          <h1 class="brand-cn mb-0">录取预测系统</h1>
        </div>
        <nav class="nav nav-pills flex-wrap gap-2" aria-label="页面导航">
          <a class="nav-link {{ 'active' if request.path == '/' else '' }}" href="/">高考分预测</a>
          <a class="nav-link {{ 'active' if request.path.startswith('/mock-convert') else '' }}" href="/mock-convert">联考换算预测</a>
          <a class="nav-link {{ 'active' if request.path.startswith('/about') else '' }}" href="/about">关于</a>
        </nav>
      </div>
    </header>

    {% if site_meta.notice %}
    <section class="alert alert-info border-0 shadow-sm mb-3" role="status">
      <div class="fw-semibold">{{ site_meta.notice }}</div>
      {% if site_meta.contact %}<div class="small mt-1">联系：{{ site_meta.contact }}</div>{% endif %}
    </section>
    {% endif %}

    <section class="hero-panel p-4 p-lg-5 mb-3">
      <p class="hero-kicker">PROJECT INFO</p>
      <h2 class="hero-title">关于作者与项目</h2>
      <p class="hero-subtitle mb-0">这里用于展示作者信息、项目背景、联系方式等内容。</p>
    </section>

    <section class="card border-0 shadow-sm">
      <div class="card-body p-4 about-card">
        {% include '_about_content.html' %}
      </div>
    </section>
  </main>
</body>
</html>
